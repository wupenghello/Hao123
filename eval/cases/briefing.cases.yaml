# eval/cases/briefing.cases.yaml
#
# 晨报评测的 10 条样例。每条 vars.context 是一段合成的「工作台快照」，模仿
# src/features/chat/dashboard-context.ts 的 collect() 输出格式（日期行 / 天气行 / 任务 / Bug / 本地待办）。
# 逐条 assert 见各 case；所有 case 还会再跑一遍 promptfooconfig.yaml 里的 defaultTest 通用断言。
#
# 这些是固定输入——评测要的就是可复现：同一个 context，不同 prompt / 不同模型，比谁过得多。
# 日期口径：今天 = 2026-07-08（07-07 即逾期，07-08 即今天截止）。

- description: "① 有逾期任务 → 必须点名逾期"
  vars:
    context: |-
      现在是7月8日星期二 上午。
      所在城市：杭州。当前多云 26°C。今日 22~30°C，白天多云。
      我的开发任务（2 个）：
      「修复登录页内存泄漏」（进行中，优先级2，截止2026-07-07）
      「订单导出加日期筛选」（未开始，优先级3，截止2026-07-10）
      当前没有测试提给我的 Bug。
      我的本地待办（1 个）：
      「周报」（优先级中，截止2026-07-10）
  assert:
    - type: contains
      value: "逾期"

- description: "② 今天截止任务 → 必须点名今天"
  vars:
    context: |-
      现在是7月8日星期二 上午。
      所在城市：杭州。当前晴 28°C。今日 24~32°C，白天晴。
      我的开发任务（1 个）：
      「对接支付回调」（进行中，优先级2，截止2026-07-08）
      当前没有测试提给我的 Bug。
      当前没有本地待办。
  assert:
    - type: contains
      value: "今天"

- description: "③ 空收件箱 → 不许造任务、不许喊逾期、要简短"
  vars:
    context: |-
      现在是7月8日星期二 上午。
      所在城市：杭州。当前晴 27°C。今日 23~31°C，白天晴。
      当前没有指派给我的开发任务。
      当前没有测试提给我的 Bug。
      当前没有本地待办。
  assert:
    - type: not-icontains
      value: "支付回调"
    - type: not-icontains
      value: "登录页"
    - type: not-icontains
      value: "逾期"
    - type: not-contains
      value: "**紧急**"
    - type: javascript
      value: output.length < 140

- description: "④ 暴雨天气 → 贴心提示要带伞/提雨"
  vars:
    context: |-
      现在是7月8日星期二 下午。
      所在城市：深圳。当前大雨 23°C。今日 21~26°C，白天大雨。
      我的开发任务（1 个）：
      「重构搜索接口」（进行中，优先级3，截止2026-07-12）
      当前没有测试提给我的 Bug。
      当前没有本地待办。
  assert:
    - type: contains-any
      value: ["伞", "雨"]

- description: "⑤ 高温 38°C → 提示多喝水/防暑"
  vars:
    context: |-
      现在是7月8日星期二 中午。
      所在城市：武汉。当前晴 38°C。今日 30~39°C，白天晴。
      我的开发任务（1 个）：
      「统计报表联调」（进行中，优先级3，截止2026-07-11）
      当前没有测试提给我的 Bug。
      当前没有本地待办。
  assert:
    - type: contains-any
      value: ["水", "暑", "热", "降温", "防"]

- description: "⑥ 高负载 8 项 → 仍要精炼（<400字）且抓到最紧急项"
  vars:
    context: |-
      现在是7月8日星期二 上午。
      所在城市：杭州。当前阴 25°C。今日 22~29°C，白天阴。
      我的开发任务（5 个）：
      「线上告警先排查」（未开始，优先级1，截止2026-07-08）
      「A 接口联调」（进行中，优先级2，截止2026-07-09）
      「B 模块重构」（进行中，优先级2，截止2026-07-12）
      「C 文档补全」（未开始，优先级3，截止2026-07-15）
      「D 依赖升级」（未开始，优先级4，截止2026-07-20）
      测试提给我的 Bug（2 个）：
      「列表分页错乱」（待解决，主要级）
      「导出文件名乱码」（待解决，次要级）
      我的本地待办（1 个）：
      「准备周会汇报」（优先级高，截止2026-07-08）
  assert:
    - type: javascript
      value: output.length < 400
    - type: contains
      value: "线上告警"

- description: "⑦ 本地紧急待办(pri1) → 必须点名"
  vars:
    context: |-
      现在是7月8日星期二 上午。
      所在城市：杭州。当前多云 24°C。今日 21~28°C，白天多云。
      我的开发任务（1 个）：
      「日常巡检」（进行中，优先级3，截止2026-07-11）
      当前没有测试提给我的 Bug。
      我的本地待办（1 个）：
      「准备明早评审材料」（优先级紧急，截止2026-07-08）
  assert:
    - type: contains
      value: "准备明早评审材料"

- description: "⑧ 3 个 active Bug → 要提到 Bug"
  vars:
    context: |-
      现在是7月8日星期二 上午。
      所在城市：杭州。当前多云 25°C。今日 22~29°C，白天多云。
      当前没有指派给我的开发任务。
      测试提给我的 Bug（3 个）：
      「支付金额偶尔少一分」（待解决，严重级）
      「登录偶发 500」（待解决，主要级）
      「文案错别字」（待解决，轻微级）
      当前没有本地待办。
  assert:
    - type: contains
      value: "Bug"

- description: "⑨ 多个进行中、无紧急 → 语气平稳，不硬造紧急"
  vars:
    context: |-
      现在是7月8日星期二 上午。
      所在城市：杭州。当前多云 25°C。今日 22~29°C，白天多云。
      我的开发任务（2 个）：
      「用户中心改版」（进行中，优先级3，截止2026-07-14）
      「权限细化」（进行中，优先级3，截止2026-07-16）
      当前没有测试提给我的 Bug。
      当前没有本地待办。
  assert:
    - type: not-icontains
      value: "逾期"
    # 只拦"被当成真紧急而加粗点名"（**紧急**），不误伤"没有紧急"这类正确否定句
    - type: not-contains
      value: "**紧急**"

- description: "⑩ 超长任务名 → 仍要完整保留，不被截断"
  vars:
    context: |-
      现在是7月8日星期二 上午。
      所在城市：杭州。当前多云 25°C。今日 22~29°C，白天多云。
      我的开发任务（1 个）：
      「这是一个非常非常长的任务标题用来测试简报是否会完整保留而不是被截断或省略」（进行中，优先级2，截止2026-07-09）
      当前没有测试提给我的 Bug。
      当前没有本地待办。
  assert:
    - type: contains
      value: "测试简报是否会完整保留"
